{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bosgenesis-release-note-agent.fullname" . }}-api
  labels:
    {{- include "bosgenesis-release-note-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bosgenesis-release-note-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "bosgenesis-release-note-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bosgenesis-release-note-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - uvicorn
            - grna.api.app:create_app
            - --factory
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.api.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "bosgenesis-release-note-agent.fullname" . }}-config
          env:
            - name: GRNA_API_PORT
              value: {{ .Values.api.port | quote }}
            {{- if .Values.external.databaseUrlSecret.name }}
            - name: GRNA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.databaseUrlSecret.name }}
                  key: {{ .Values.external.databaseUrlSecret.key }}
            {{- end }}
            {{- if .Values.external.redisUrlSecret.name }}
            - name: GRNA_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.redisUrlSecret.name }}
                  key: {{ .Values.external.redisUrlSecret.key }}
            {{- end }}
            {{- if .Values.external.langfusePublicKeySecret.name }}
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.langfusePublicKeySecret.name }}
                  key: {{ .Values.external.langfusePublicKeySecret.key }}
            {{- end }}
            {{- if .Values.external.langfuseSecretKeySecret.name }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.langfuseSecretKeySecret.name }}
                  key: {{ .Values.external.langfuseSecretKeySecret.key }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bosgenesis-release-note-agent.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
