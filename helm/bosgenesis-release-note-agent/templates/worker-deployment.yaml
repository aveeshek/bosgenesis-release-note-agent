{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bosgenesis-release-note-agent.fullname" . }}-worker
  labels:
    {{- include "bosgenesis-release-note-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "bosgenesis-release-note-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "bosgenesis-release-note-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "bosgenesis-release-note-agent.serviceAccountName" . }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "bosgenesis-release-note-agent.fullname" . }}-config
          {{- if or .Values.external.langfusePublicKeySecret.name .Values.external.langfuseSecretKeySecret.name }}
          env:
            {{- if .Values.external.langfusePublicKeySecret.name }}
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.langfusePublicKeySecret.name }}
                  key: {{ .Values.external.langfusePublicKeySecret.key }}
            {{- end }}
            {{- if .Values.external.langfuseSecretKeySecret.name }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.external.langfuseSecretKeySecret.name }}
                  key: {{ .Values.external.langfuseSecretKeySecret.key }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bosgenesis-release-note-agent.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
