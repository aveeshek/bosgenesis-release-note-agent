apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bosgenesis-release-note-agent.fullname" . }}-config
  labels:
    {{- include "bosgenesis-release-note-agent.labels" . | nindent 4 }}
data:
  GRNA_APP_NAME: {{ .Values.config.appName | quote }}
  GRNA_ENVIRONMENT: {{ .Values.config.environment | quote }}
  GRNA_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  GRNA_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  GRNA_WORKSPACE_ROOT: {{ .Values.config.workspaceRoot | quote }}
  GRNA_ARTIFACT_ROOT: {{ .Values.config.artifactRoot | quote }}
  GRNA_JOB_ROOT: {{ .Values.config.jobRoot | quote }}
  GRNA_LOG_ROOT: {{ .Values.config.logRoot | quote }}
  GRNA_MAX_REPO_SIZE_MB: {{ .Values.config.maxRepoSizeMb | quote }}
  GRNA_MAX_FILE_SIZE_MB: {{ .Values.config.maxFileSizeMb | quote }}
  GRNA_CLONE_TIMEOUT_SECONDS: {{ .Values.config.cloneTimeoutSeconds | quote }}
  GRNA_ANALYSIS_TIMEOUT_SECONDS: {{ .Values.config.analysisTimeoutSeconds | quote }}
  GRNA_ENABLE_REST_API: {{ .Values.config.enableRestApi | quote }}
  GRNA_ENABLE_MCP_SERVER: {{ .Values.config.enableMcpServer | quote }}
  GRNA_ENABLE_CLI: {{ .Values.config.enableCli | quote }}
  GRNA_ENABLE_PDF_RENDERING: {{ .Values.config.enablePdfRendering | quote }}
  GRNA_ENABLE_LLM_SUMMARY: {{ .Values.config.enableLlmSummary | quote }}
  GRNA_ENABLE_OTEL: {{ .Values.config.enableOtel | quote }}
  GRNA_ENABLE_LANGFUSE: {{ .Values.config.enableLangfuse | quote }}
  GRNA_MCP_ALLOWED_HOSTS: {{ .Values.config.mcpAllowedHosts | quote }}
