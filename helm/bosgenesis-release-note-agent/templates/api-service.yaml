{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bosgenesis-release-note-agent.fullname" . }}-api
  labels:
    {{- include "bosgenesis-release-note-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bosgenesis-release-note-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}

