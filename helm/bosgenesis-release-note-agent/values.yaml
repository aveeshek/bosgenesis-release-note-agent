replicaCount: 1

image:
  repository: ghcr.io/aveeshek/bosgenesis-release-note-agent
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

config:
  appName: bosgenesis-release-note-agent
  environment: production
  logLevel: INFO
  logFormat: json
  workspaceRoot: /data/workspaces
  artifactRoot: /data/artifacts
  jobRoot: /data/jobs
  logRoot: /data/logs
  maxRepoSizeMb: "500"
  maxFileSizeMb: "10"
  cloneTimeoutSeconds: "120"
  analysisTimeoutSeconds: "600"
  enableRestApi: "true"
  enableMcpServer: "true"
  enableCli: "true"
  enablePdfRendering: "true"
  enableLlmSummary: "false"
  enableLlmReasoning: "true"
  llmDefaultModel: "gemma4:26b"
  llmProvider: "ollama"
  ollamaBaseUrl: "http://ollama.bosgenesis.svc.cluster.local:11434"
  llmMinimumConfidence: "0.85"
  enableOtel: "false"
  enableLangfuse: "false"
  langfuseHost: "http://langfuse-web.bosgenesis.svc.cluster.local:3000"
  otelExporterOtlpEndpoint: "http://signoz-otel-collector.signoz.svc.cluster.local:4317"
  observabilityAuditEnabled: "true"
  observabilityPhaseMetricsEnabled: "true"
  observabilityWarningTaxonomyEnabled: "true"
  mcpAllowedHosts: "localhost,127.0.0.1,release-note-agent.bosgenesis.local,bosgenesis-release-note-agent-mcp,bosgenesis-release-note-agent-mcp.bosgenesis.svc,bosgenesis-release-note-agent-mcp.bosgenesis.svc.cluster.local"

external:
  databaseUrlSecret:
    name: ""
    key: DATABASE_URL
  redisUrlSecret:
    name: ""
    key: REDIS_URL
  langfusePublicKeySecret:
    name: ""
    key: LANGFUSE_PUBLIC_KEY
  langfuseSecretKeySecret:
    name: ""
    key: LANGFUSE_SECRET_KEY

api:
  enabled: true
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources: {}

mcp:
  enabled: true
  port: 8090
  service:
    type: ClusterIP
    port: 8090
  resources: {}

worker:
  enabled: false
  command:
    - python
    - -m
    - grna.cli.main
  resources: {}

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  storageClassName: ""

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: release-note-agent.bosgenesis.local
      paths:
        - path: /mcp
          pathType: Prefix
          service: mcp
        - path: /
          pathType: Prefix
          service: api
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
